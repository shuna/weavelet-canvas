name = "weavelet-stream-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

# KV namespace for stream recovery
# To create: wrangler kv namespace create STREAM_CACHE
# Then replace the id below with the output
[[kv_namespaces]]
binding = "STREAM_CACHE"
id = "9351a4f5bea84b8495cbebdbada260e4"

# For local development:
# [[kv_namespaces]]
# binding = "STREAM_CACHE"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"
# preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

# Secrets (set via `wrangler secret put <NAME>`):
# - PROXY_AUTH_TOKEN: Token to authenticate clients to this proxy
